name: Auto Xray Config Scanner

on:
  schedule:
    - cron: '0 */6 * * *' # اجرای خودکار هر ۶ ساعت یک‌بار (می‌توانید زمان را تغییر دهید)
  workflow_dispatch: # امکان اجرای دستی ورک‌فلو از لبه Actions در گیت‌هاب

permissions:
  contents: write # دادن مجوز به گیت‌هاب برای ثبت و پوش کردن فایل‌های خروجی در ریپازیتوری

jobs:
  scan-and-update:
    runs-on: ubuntu-latest

    steps:
      # مرحله ۱: دانلود کردن کدهای ریپازیتوری شما روی سرور گیت‌هاب
      - name: Checkout Repository
        uses: actions/checkout@v4

      # مرحله ۲: نصب و راه‌اندازی پایتون نسخه ۳.۱۰
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # مرحله ۳: نصب وابستگی‌های پایتون (کتابخانه requests)
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # مرحله ۴: دانلود، استخراج و فعال‌سازی مجوز اجرای هسته Xray نسخه لینوکس ۶4 بیتی
      - name: Install Xray Core
        run: |
          wget https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip Xray-linux-64.zip xray
          chmod +x xray
          rm Xray-linux-64.zip

      # مرحله ۵: اجرای اسکریپت پایتون و ساخت کانفیگ‌ها
      - name: Run Processor Script
        env:
          REALITY_OUTPUT_FILENAME: "khanevadeh"  # نام پایه فایل خروجی شما
        run: |
          python processor.py

      # مرحله ۶: ذخیره و پوش (Push) کردن فایل‌های تولید شده در پوشه data به ریپازیتوری شما
      - name: Commit and Push Verified Configs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # بررسی اینکه آیا پوشه data تغییراتی داشته است یا خیر
          git add data/
          
          # اگر تغییراتی وجود داشت، کامیت و پوش انجام می‌شود تا خطا رخ ندهد
          git diff-index --quiet HEAD || git commit -m "Update verified configs: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
